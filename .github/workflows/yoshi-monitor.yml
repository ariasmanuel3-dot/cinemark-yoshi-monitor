name: Yoshi stock monitor

on:
  workflow_dispatch:

concurrency:
  group: yoshi-stock-monitor
  cancel-in-progress: false

jobs:
  check-stock:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Ensure state directory exists
        run: mkdir -p state

      - name: Run multi-store monitor
        run: python monitor.py

      - name: Compute transitions
        run: python compute_transitions.py

      - name: Decide whether email is needed
        id: should_email
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary = json.loads(Path("state/transition_summary.json").read_text(encoding="utf-8"))
          changed = summary.get("changed_stores", [])
          value = "true" if changed else "false"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"send={value}\n")
          PY

      - name: Send email summary
        if: steps.should_email.outputs.send == 'true'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
          ALERT_FROM: ${{ secrets.ALERT_FROM }}
        run: python send_email.py

      - name: Commit updated state
        shell: bash
        run: |
          if git diff --quiet -- state/last_state.json; then
            echo "No state change to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add state/last_state.json
          git commit -m "Update multi-store monitor state"
          git pull --rebase origin main
          git push

      - name: Upload debug evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yoshi-monitor-debug
          path: |
            debug/
            state/
          retention-days: 7
